name: VayuBus — Build, Approve & Deploy to EKS

on:
  # ── Auto trigger on push ───────────────────────
  push:
    branches:
      - main
      - develop
      - staging

  # ── Manual trigger with inputs  select ENVS────────────────
  workflow_dispatch:
    inputs:
      environment:
        description: "🌍 Select Deploy Environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: dev

      branch:
        description: "🌿 Branch to deploy"
        required: true
        type: choice
        options:
          - main
          - develop
          - staging
        default: main

      image_tag:
        description: "🐳 Docker image tag (leave empty = auto)"
        required: false
        default: ""

      skip_tests:
        description: "⚡ Skip vulnerability scan?"
        required: false
        type: boolean
        default: false

      force_deploy:
        description: "🚀 Force deploy even if no changes?"
        required: false
        type: boolean
        default: false

# ── Prevent concurrent deployments ────────────────
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: shivaram1918
  DOCKERHUB_REPO:     shivaram1918/vayubus
  AWS_REGION:         us-east-2
  EKS_CLUSTER:        education-eks-KpTuIttB

jobs:

  # ─────────────────────────────────────────────────
  #  JOB 1: Setup — decide environment & tag
  # ─────────────────────────────────────────────────
  setup:
    name: 🔧 Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      namespace:   ${{ steps.vars.outputs.namespace }}
      image_tag:   ${{ steps.vars.outputs.image_tag }}
      image_uri:   ${{ steps.vars.outputs.image_uri }}
      replicas:    ${{ steps.vars.outputs.replicas }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment & variables
        id: vars
        run: |
          # ── Determine environment ──────────────
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="production"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            ENV="staging"
          else
            ENV="dev"
          fi

          # ── Determine namespace ────────────────
          if   [ "$ENV" = "production" ]; then NS="default"
          elif [ "$ENV" = "staging" ];    then NS="staging"
          else                                 NS="dev"
          fi

          # ── Determine replicas ─────────────────
          if   [ "$ENV" = "production" ]; then REPLICAS="3"
          elif [ "$ENV" = "staging" ];    then REPLICAS="2"
          else                                 REPLICAS="1"
          fi

          # ── Determine image tag ────────────────
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="${ENV}-${SHORT_SHA}"
          fi

          URI="${{ env.DOCKERHUB_REPO }}:${TAG}"

          echo "environment=${ENV}"   >> $GITHUB_OUTPUT
          echo "namespace=${NS}"      >> $GITHUB_OUTPUT
          echo "image_tag=${TAG}"     >> $GITHUB_OUTPUT
          echo "image_uri=${URI}"     >> $GITHUB_OUTPUT
          echo "replicas=${REPLICAS}" >> $GITHUB_OUTPUT

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment : ${ENV}"
          echo "  Namespace   : ${NS}"
          echo "  Image URI   : ${URI}"
          echo "  Replicas    : ${REPLICAS}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────
  #  JOB 2: Build & Push to DockerHub
  # ─────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.setup.outputs.image_uri }}
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ needs.setup.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "### 🐳 Docker Image Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                    >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                    >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.setup.outputs.image_uri }}\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ needs.setup.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |"                      >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────
  #  JOB 3: Security Scan
  # ─────────────────────────────────────────────────
  scan:
    name: 🔍 Security Scan
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.setup.outputs.image_uri }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ needs.setup.outputs.environment }}
          path: trivy-report.txt

  # ─────────────────────────────────────────────────
  #  JOB 4: Manual Approval Gate 🔐
  #
  #  HOW TO SETUP APPROVAL:
  #  GitHub Repo → Settings → Environments
  #  → Create: "dev", "staging", "production"
  #  → Each env → Add "Required reviewers" (your GitHub username)
  #  → Production → Also enable "Wait timer" (e.g. 5 min)
  #
  #  When pipeline runs → it will PAUSE here
  #  → Reviewer gets email notification
  #  → They click Approve/Reject in GitHub Actions UI
  # ─────────────────────────────────────────────────
  approval:
    name: ✅ Waiting for Approval — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, build, scan]
    if: always() && needs.build.result == 'success'

    # ⬇️ This line makes GitHub PAUSE and wait for manual approval
    environment:
      name: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Approval granted
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ DEPLOYMENT APPROVED BY: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment : ${{ needs.setup.outputs.environment }}"
          echo "  Image       : ${{ needs.setup.outputs.image_uri }}"
          echo "  Namespace   : ${{ needs.setup.outputs.namespace }}"
          echo "  Replicas    : ${{ needs.setup.outputs.replicas }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────
  #  JOB 5: Deploy to EKS
  # ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EKS — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, approval]
    if: needs.approval.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ needs.setup.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Patch image & replicas
        run: |
          sed -i "s|shivaram1918/vayubus:v1|${{ needs.setup.outputs.image_uri }}|g" \
            k8s/deployment.yml
          sed -i "s|replicas: 2|replicas: ${{ needs.setup.outputs.replicas }}|g" \
            k8s/deployment.yml
          echo "✅ Patched:"
          grep -E "image:|replicas:" k8s/deployment.yml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/deployment.yml -n ${{ needs.setup.outputs.namespace }}
          kubectl apply -f k8s/service.yml    -n ${{ needs.setup.outputs.namespace }}
          kubectl apply -f k8s/hpa.yaml       -n ${{ needs.setup.outputs.namespace }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/vayubus-deployment \
            -n ${{ needs.setup.outputs.namespace }} \
            --timeout=300s

      - name: Get App URL
        id: url
        run: |
          sleep 15
          URL=$(kubectl get svc vayubus-service \
            -n ${{ needs.setup.outputs.namespace }} \
            -o jsonpath='http://{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "🌐 App URL: ${URL}"

      - name: Final summary
        run: |
          echo "### 🚌 VayuBus Deployed!"              >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                        >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                        >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Env      | \`${{ needs.setup.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Image    | \`${{ needs.setup.outputs.image_uri }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| 📦 NS       | \`${{ needs.setup.outputs.namespace }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| 🔁 Replicas | \`${{ needs.setup.outputs.replicas }}\` |"    >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL      | ${{ steps.url.outputs.url }} |"               >> $GITHUB_STEP_SUMMARY
          echo ""                                       >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                 >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ needs.setup.outputs.namespace }} -l app=vayubus >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                 >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────
  #  JOB 6: Notify on failure
  # ─────────────────────────────────────────────────
  notify-failure:
    name: ❌ Notify Failure
    runs-on: ubuntu-latest
    needs: [setup, build, deploy]
    if: failure()

    steps:
      - name: Failure summary
        run: |
          echo "### ❌ Deployment Failed!"              >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                        >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                        >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ needs.setup.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch      | \`${{ github.ref_name }}\` |"                 >> $GITHUB_STEP_SUMMARY
          echo "| Commit      | \`${{ github.sha }}\` |"                      >> $GITHUB_STEP_SUMMARY
          echo "| Actor       | \`${{ github.actor }}\` |"                    >> $GITHUB_STEP_SUMMARY
