<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" width="40" height="40">
  <!-- Bus body -->
  <rect x="4" y="10" width="32" height="20" rx="4" fill="#00d4aa" opacity=".15" stroke="#00d4aa" stroke-width="1.5"/>
  <rect x="4" y="10" width="32" height="14" rx="4" fill="#00d4aa" opacity=".08"/>
  <!-- Windows -->
  <rect x="8"  y="13" width="6" height="5" rx="1.5" fill="#00d4aa" opacity=".7"/>
  <rect x="17" y="13" width="6" height="5" rx="1.5" fill="#00d4aa" opacity=".7"/>
  <rect x="26" y="13" width="6" height="5" rx="1.5" fill="#00d4aa" opacity=".7"/>
  <!-- Door -->
  <rect x="17" y="21" width="6" height="9" rx="1" fill="#00d4aa" opacity=".35"/>
  <!-- Wheels -->
  <circle cx="11" cy="31" r="4" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5"/>
  <circle cx="11" cy="31" r="1.5" fill="#00d4aa" opacity=".6"/>
  <circle cx="29" cy="31" r="4" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5"/>
  <circle cx="29" cy="31" r="1.5" fill="#00d4aa" opacity=".6"/>
  <!-- Headlight -->
  <rect x="33" y="16" width="3" height="4" rx="1" fill="#f59e0b" opacity=".9"/>
  <!-- Speed lines -->
  <line x1="1" y1="18" x2="5" y2="18" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <line x1="1" y1="22" x2="5" y2="22" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
</svg>
