---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vayubus-sa
  namespace: vayubus
  labels:
    app: vayubus
  # Uncomment for IRSA:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/vayubus-role

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vayubus-hpa
  namespace: vayubus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vayubus
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vayubus-pdb
  namespace: vayubus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vayubus
